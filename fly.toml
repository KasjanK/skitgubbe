# fly.toml app configuration file generated for skitgubbe on 2026-03-07T21:36:39+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skitgubbe'
primary_region = 'arn'

[build]
  [build.args]
    GO_VERSION = '1.25.1'

[env]
  PORT = '8080'
  DB_PATH="/data/skitgubbe.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "skitgubbe_data"
  destination = "/data"
