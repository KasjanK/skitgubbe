<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Game Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/room.css" />
</head>
<body>

<div class="room-container">

  <header class="room-header">
    <h1>Game Room</h1>
    <span class="room-id">Room ID: <span id="room-id"></span></span>
  </header>

  <section class="players">
    <h2>Players</h2>

    <ul id="player-list" class="player-list">
    </ul>
  </section>

  <footer class="actions">
    <button id="readyBtn" onclick="toggleReady()">Ready</button>

    <button id="start-game" class="primary">Start Game</button>
  </footer>

</div>

<script>
    const roomId = "{{ .RoomID }}";
    const currentUserId = "{{ .UserID }}";

    async function refreshRoom() {
        const res = await fetch('/api/rooms/' + encodeURIComponent(roomId));
        if (!res.ok) return;

        const room = await res.json();

        // render players
        const ul = document.getElementById('player-list');
        ul.innerHTML = '';
        room.players.forEach(p => {
            const li = document.createElement('li');
            li.textContent = p.id; 
            ul.appendChild(li);
        });

        // host-only start button
        const startBtn = document.getElementById('start-game');
        if (room.owner_id === currentUserId && !room.started) {
            startBtn.disabled = false;
        } else {
            startBtn.disabled = true;
        }

        // if game already started, redirect everyone
        if (room.started && room.game_id) {
            window.location = '/game/' + encodeURIComponent(room.game_id);
        }
    }

    document.getElementById('start-game').addEventListener('click', async () => {
        const res = await fetch(
            '/api/rooms/' + encodeURIComponent(roomId) + '/start',
            { method: 'POST' }
        );

        if (!res.ok) {
            alert('Failed to start game');
            return;
        }

        const data = await res.json();
        window.location = '/game/' + encodeURIComponent(data.game_id);
    });

    // initial load + polling so joiners see updates and redirect
    refreshRoom();
    setInterval(refreshRoom, 2000);
</script>
</body>
</html>
