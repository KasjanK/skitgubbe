<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SKITGUBBE — Login</title>
  <link rel="stylesheet" href="/static/css/login.css"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div class="login-wrap">
    <div class="game-title">SKITGUBBE</div>
    <div class="game-subtitle">♠ LOGIN ♥</div>

    <div class="card-deco">
      <div class="deco-card">♥</div>
      <div class="deco-card">♠</div>
      <div class="deco-card">♦</div>
      <div class="deco-card">♣</div>
    </div>

    <div class="panel">
      <div class="section-label">Player Login</div>
      <div class="pixel-divider"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" class="input-field" type="text" placeholder="ENTER NAME..." autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" class="input-field" type="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-gold" id="submit-btn">▶ ENTER GAME</button>
        </div>
      </form>
    <div class="switch-link">No account? <a href="/signup">SIGN UP</a></div>
    </div>

  </div>

  <script src="/static/js/common.js"></script>
  <script>
    const form      = document.getElementById('login-form');
    const errEl     = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ LOADING...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await API.post('/api/login', { email, password });
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Try again.';
        errEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '▶ ENTER GAME';
      }
    });
  </script>
</body>
</html>
