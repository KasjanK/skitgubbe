<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Skitgubbe</title>
        <link rel="stylesheet" href="/static/css/game.css" />
    </head>
    <body>
        <p>Game ID: <span id="game-id"></p>
        <p>Current player: <span id="current-player"></p>
        <ul id="your-hand"></ul>
        <ul id="your-table-cards-fu"></ul>
        <ul id="your-table-cards-fd"></ul>
        <ul id="other-hands"></ul>
        <button id="pickup">Pickup Pile</button>
        <button id="chance">Chance</button>
        <div class="pile" id="pile"></div>
        
        <script>
            const gameId = window.location.pathname.split('/')[2]; // /game/{id}
            document.getElementById('game-id').innerHTML = gameId

            const pickup = document.getElementById('pickup');
            pickup.addEventListener('click', () => pickupPile());

            const change = document.getElementById('chance');
            change.addEventListener('click', () => chanceCard());

            async function refreshGame() {
                const res = await fetch('/api/games/' + encodeURIComponent(gameId));
                if (!res.ok) return;

                const state = await res.json();

                const handUl = document.getElementById('your-hand');
                handUl.innerHTML = '';

                const tableCardsFu = document.getElementById('your-table-cards-fu');
                tableCardsFu.innerHTML = '';

                const tableCardsFd = document.getElementById('your-table-cards-fd');
                tableCardsFd.innerHTML = '';

                const isYourTurn = state.current_player === state.you.id;

                state.you.hand.forEach(card => {
                    const li = document.createElement('li');
                    li.textContent = `Rank: ${card.rank}, Suit: ${card.suit}`;
                    li.dataset.rank = card.rank;
                    li.dataset.suit = card.suit;
                    li.addEventListener('click', () => playCard(card));
                    handUl.appendChild(li);
                });

                state.you.faceup_table_cards.forEach((card, idx) => {
                    const li = document.createElement('li');
                    li.className = 'card';
                    li.textContent = `${card.rank} ${card.suit}`;
                    li.addEventListener('click', () => playFaceUp(idx));
                    tableCardsFu.appendChild(li);
                });

                state.you.facedown_table_cards.forEach((_, idx) => {
                    const li = document.createElement('li');
                    li.className = 'card card-back';
                    li.addEventListener('click', () => playFaceDown(idx));
                    tableCardsFd.className = 'face-down-hand';
                    tableCardsFd.appendChild(li);
                });

                const othersDiv = document.getElementById('other-hands');
                othersDiv.innerHTML = '';

                state.others.forEach(p => {
                    const container = document.createElement('div');
                    container.className = 'player-hand';

                    const label = document.createElement('div');
                    label.textContent = `Player ${p.id}`;
                    container.appendChild(label);

                    const cards = document.createElement('div');
                    cards.className = 'face-down-hand';

                    for (let i = 0; i < p.hand_size; i++) {
                        const cardBack = document.createElement('div');
                        cardBack.className = 'card card-back';
                        cards.appendChild(cardBack);
                    }

                    container.appendChild(cards);
                    othersDiv.appendChild(container);
                });


                document.getElementById('current-player').textContent = isYourTurn ? 'Your turn' : `Waiting for ${state.current_player}`; 
                renderPile(state);
            }

            function renderPile(state) {
                const pileEl = document.getElementById('pile');
                pileEl.innerHTML = '';

                const cards = state.pile || []; // fallback to empty array
                cards.forEach((card, i) => {
                    const el = document.createElement('div');
                    el.classList.add('card');
                    el.textContent = `${card.rank} ${card.suit}`;
                    el.style.position = 'absolute';
                    el.style.top = `${i * 2}px`;
                    el.style.left = `${i * 2}px`;
                    pileEl.appendChild(el);
                });
            }

            async function playCard(card) {
                const res = await fetch(`/api/games/${encodeURIComponent(gameId)}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'play_card',
                        card: { rank: card.rank, suit: card.suit },
                    }),
                });

                if (!res.ok) return;
                await refreshGame();
            }
            
            async function pickupPile() {
                const res = await fetch(`/api/games/${encodeURIComponent(gameId)}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'pickup',
                    }),
                });

                if (!res.ok) return;
                await refreshGame();
            }

            async function chanceCard() {
                const res = await fetch(`/api/games/${encodeURIComponent(gameId)}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'chance',
                    }),
                });

                if (!res.ok) return;
                await refreshGame();
            }

            async function playFaceDown(index) {
                const res = await fetch(`/api/games/${encodeURIComponent(gameId)}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'play_face_down',
                        index,
                    }),
                });

                if (!res.ok) return;
                await refreshGame();
            }

            async function playFaceUp(index) {
                const res = await fetch(`/api/games/${encodeURIComponent(gameId)}/move`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'play_face_up',
                        index,
                    }),
                });

                if (!res.ok) return;
                await refreshGame();
            }
            refreshGame();
            setInterval(refreshGame, 1000);
        </script>
    </body>
